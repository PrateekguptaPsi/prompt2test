name: QA Automation

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  e2e:
    name: UI + API test suite
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      ODOO_URL: ${{ secrets.ODOO_URL }}
      ODOO_DB: ${{ secrets.ODOO_DB }}
      ODOO_USER: ${{ secrets.ODOO_USER }}
      ODOO_PASSWORD: ${{ secrets.ODOO_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Type-check framework
        run: npx tsc --noEmit -p 05_automation/tsconfig.json

      - name: Seed synthetic Faker data (idempotent)
        run: npm run seed

      - name: Run UI + API suites (all cases)
        id: tests
        run: npm run test:all

      - name: Publish executive summary to job page
        if: always()
        run: |
          if [ -f 05_automation/reports/summary/summary.md ]; then
            cat 05_automation/reports/summary/summary.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload reports (HTML dashboard, Playwright report, JUnit)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-reports
          path: 05_automation/reports/
          retention-days: 30
